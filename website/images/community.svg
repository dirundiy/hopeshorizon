<?xml version="1.0" encoding="UTF-8"?>
<!--
  Community crowd illustration for Hopes Horizon.
  Single-color silhouettes meant to be used at low opacity as a background.
  To use your own photo instead, see README.md ("Swapping in real photos").
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMax slice" fill="#ffffff">
